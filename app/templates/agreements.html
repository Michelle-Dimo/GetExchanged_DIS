{% extends 'base.html' %}

{% block title %}
    Agreements
{% endblock %}

{% block content %}
        <div class="hero-section">
            <h1>Agreements</h1>
        </div>
    {% for agreement in agreements %}
        <div class="card-container">
                <a href="{{ url_for('agreements.agreement', id=agreement['id']) }}" class="agreement-card card">
                <h3>{{agreement['institution']}}</h3>
                <p>ID: {{agreement['id']}}</p>
            </a>
        </div>
    {% endfor %}
{% endblock %}
