{% extends 'base.html' %}

{% block header %}
  <h1>{% block title %}
        <h2>Agreements</h2>
    {% endblock %}</h1>
{% endblock %}

{% block content %}
    {% for agreement in agreements %}
        <div class='agreement'>
            <h3>{{ agreement['institution'] }} - {{ agreement['id'] }}</h3>
            <p class='agreement_text'>{{ agreement['text'] }}</p>
        </div>
    {% endfor %}
{% endblock %}
