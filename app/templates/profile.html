{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}
<div class="profile-container">
    <div class="profile-card">
        <h1> Profile</h1>
        <p>
            Log into your account or create a new profile to continue.
        </p>
        <div class="profile-buttons">
            <a href="{{ url_for('login') }}" class="btn login-btn">
                Log In
            </a>
            <a href="{{ url_for('register') }}" class="btn register-btn">
                Create Account
            </a>
        </div>
    </div>
</div>
{% endblock %}
