{% extends "base.html" %}
{% block title %}Register{% endblock %}

{% block content %}

<div class="form-container">

    <form class="form-card" method="POST" action="{{ url_for('auth.register') }}">

        <h1>Create Account</h1>

        <input type="text" name="ku_id" placeholder="KU ID" required>

        <input type="text" name="full_name" placeholder="Full Name" required>

        <input type="email" name="email" placeholder="Email" required>

        <input type="text" name="study_field" placeholder="Study Field" required>

        <input type="text" name="academic_year" placeholder="Academic Year" required>

        <input type="password" name="password" placeholder="Password" required>

        <button type="submit">Create Account</button>

        <p>
            Already have an account?
            <a href="{{ url_for('auth.login') }}">Login here</a>
        </p>

    </form>

</div>

{% endblock %}
