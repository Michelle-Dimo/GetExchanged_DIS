{% extends "base.html" %}

{% block title %}Edit Profile{% endblock %}

{% block content %}

<div class="profile-container">

    <div class="profile-card">

        <h1>Edit Profile</h1>

        <form method="POST">

            <div class="profile-field">
                <label>Full Name</label>
                <input
                    type="text"
                    name="full_name"
                    value="{{ g.user['full_name'] }}"
                    required
                >
            </div>

            <div class="profile-field">
                <label>Email</label>
                <input
                    type="email"
                    name="email"
                    value="{{ g.user['email'] }}"
                    required
                >
            </div>

            <div class="profile-field">
                <label>Study Field</label>
                <input
                    type="text"
                    name="study_field"
                    value="{{ g.user['study_field'] }}"
                >
            </div>

            <div class="profile-field">
                <label for="status">My status</label>

                <select name="status" id="status">
                    <option value="Alumni"
                        {% if g.user['status'] == 'Alumni' %}selected{% endif %}>
                        Alumni
                    </option>

                    <option value="Applicant"
                        {% if g.user['status'] == 'Applicant' %}selected{% endif %}>
                        Applicant
                    </option>
                </select>
            </div>

            <button type="submit" class="btn primary-btn">
                Save Changes
            </button>

        </form>

    </div>

</div>

{% endblock %}
